<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Tabungan Kelompok</title><style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;

.container{

}

    padding:20px;

    text-align:center;
    margin-bottom:15px;
}

    text-align:center;
    font-size:36px;

    color:#2e7d32;
}

.ranking-item{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #eee;
}

.table-wrapper{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th{
    background:#222;

}

th,td{
    padding:10px;

}

}

.section-title{
    margin-bottom:15px;

}

.belum-card{
    background:#fff3cd;
    border-left:5px solid #ffc107;
}

.update-card{
    background:#e8f5e9;
    border-left:5px solid #4caf50;
}

.hijau{
    color:#2e7d32;
    font-weight:bold;
}

.merah{
    color:#c62828;
    font-weight:bold;
}

    
</style></head><body><div class="container"><div class="card">

    <h1>💰 Total Tabungan Terkumpul</h1>

    <div class="total" id="grandTotal">
        Rp0
    </div>

</div>

<div class="card">

    <h2>🏆 Perolehan Tabungan</h2>

    <div id="ranking">
        Loading...
    </div>

</div>

    <div class="card belum-card">

    <h2>⚠️ Belum Nabung Bulan Ini</h2>

    <div id="belumNabung">
        Loading...
    </div>

</div>
    <div class="card">

    <h2>💳 Total Pinjaman Beredar</h2>

    <div class="total merah" id="totalPinjaman">
        Rp0
    </div>

</div>

<div class="card belum-card">

    <h2>⚠️ Peserta Dengan Pinjaman</h2>

    <div id="pesertaPinjaman">
        Tidak ada pinjaman
    </div>

</div>

<div class="card update-card">

    <h2>🕒 Update Terakhir</h2>

    <div id="updateTerakhir">
        Loading...
    </div>

</div>

<div class="card">

    <h2 class="section-title">
        📋 Tabungan Bulanan
    </h2>

    <div class="table-wrapper">

        <table id="tabunganTable">
            <thead></thead>
            <tbody></tbody>
        </table>

    </div>

</div>

<div class="card">

    <h2 class="section-title">
        🧾 Riwayat Pembayaran
    </h2>

    <div class="table-wrapper">

        <table id="riwayatTable">

            <thead>
                <tr>
                    <th>Tanggal</th>
                    <th>Nama</th>
                    <th>Bayar</th>
                </tr>
            </thead>

            <tbody></tbody>

        </table>

    </div>

</div>

</div><script>

const TABUNGAN_URL =
'https://opensheet.elk.sh/1vgp4MkVYRFOqxoojo4mnuYkgX1cxfsUaNleyze9-qYs/tabungan';

const RIWAYAT_URL =
'https://opensheet.elk.sh/1vgp4MkVYRFOqxoojo4mnuYkgX1cxfsUaNleyze9-qYs/riwayat';

function rupiah(n){
    return 'Rp' + Number(n).toLocaleString('id-ID');
}

fetch(TABUNGAN_URL)
.then(res => res.json())
.then(data => {

    const headers = Object.keys(data[0]);

    const peserta = headers.filter(h => h !== 'Bulan');

   const pinjaman = {};
    
    const totals = {};

    peserta.forEach(p => totals[p] = 0);

    let grandTotal = 0;

    const thead =
        document.querySelector('#tabunganTable thead');

    const tbody =
        document.querySelector('#tabunganTable tbody');

    let headRow = '<tr>';

    headers.forEach(h => {

        headRow += `<th>${h}</th>`;

    });

    headRow += '<th>Total Bulan</th>';

    headRow += '</tr>';

    thead.innerHTML = headRow;

    data.forEach(row => {

        let html = '<tr>';

        let totalBulan = 0;

        headers.forEach(col => {

            let value = row[col];

            if(col !== 'Bulan'){

                value = Number(value || 0);

                totals[col] += value;

                totalBulan += value;

                if(value > 0){

    html += `
    <td class="hijau">
        ${rupiah(value)}
    </td>
    `;

}else{

    html += `
    <td class="merah">
        -
    </td>
    `;

        }

            }else{

                html += `<td>${value}</td>`;

            }

        });

        grandTotal += totalBulan;

        html += `<td>${rupiah(totalBulan)}</td>`;

        html += '</tr>';

        tbody.innerHTML += html;

    });

    let totalRow =
        '<tr class="total-row"><td>TOTAL</td>';

    peserta.forEach(p => {

        totalRow += `<td>${rupiah(totals[p])}</td>`;

    });

    totalRow += `<td>${rupiah(grandTotal)}</td></tr>`;

    tbody.innerHTML += totalRow;

    document.getElementById('grandTotal')
        .innerText = rupiah(grandTotal);

    const ranking =
        Object.entries(totals)
        .sort((a,b) => b[1]-a[1]);

    const medals = ['🥇','🥈','🥉'];

    let rankingHTML = '';

    ranking.forEach((item,index)=>{

        const icon =
            medals[index] || (index+1)+'.';

        rankingHTML += `
        <div class="ranking-item">
            <span>${icon} ${item[0]}</span>
            <strong>${rupiah(item[1])}</strong>
        </div>
        `;

    });

    document.getElementById('ranking')
        .innerHTML = rankingHTML;

    let bulanTerakhir = null;

for(let i = data.length - 1; i >= 0; i--){

    const row = data[i];

    const adaPembayaran =
        peserta.some(p =>
            Number(row[p] || 0) > 0
        );

    if(adaPembayaran){

        bulanTerakhir = row;
        break;

    }

}
<script>

const TABUNGAN_URL =
'https://opensheet.elk.sh/1vgp4MkVYRFOqxoojo4mnuYkgX1cxfsUaNleyze9-qYs/tabungan';

const RIWAYAT_URL =
'https://opensheet.elk.sh/1vgp4MkVYRFOqxoojo4mnuYkgX1cxfsUaNleyze9-qYs/riwayat';

function rupiah(n){
    return 'Rp' + Number(n).toLocaleString('id-ID');
}

Promise.all([
    fetch(TABUNGAN_URL).then(r => r.json()),
    fetch(RIWAYAT_URL).then(r => r.json())
])
.then(([tabunganData, riwayatData]) => {

    const headers = Object.keys(tabunganData[0]);
    const peserta = headers.filter(h => h !== 'Bulan');

    const totals = {};
    peserta.forEach(p => totals[p] = 0);

    let grandTotal = 0;

    const thead =
        document.querySelector('#tabunganTable thead');

    const tbody =
        document.querySelector('#tabunganTable tbody');

    let headRow = '<tr>';

    headers.forEach(h => {
        headRow += `<th>${h}</th>`;
    });

    headRow += '<th>Total Bulan</th></tr>';

    thead.innerHTML = headRow;

    tabunganData.forEach(row => {

        let html = '<tr>';
        let totalBulan = 0;

        headers.forEach(col => {

            let value = row[col];

            if(col === 'Bulan'){

                html += `<td>${value}</td>`;

            }else{

                value = Number(value || 0);

                totals[col] += value;
                totalBulan += value;

                if(value > 0){

                    html += `
                    <td class="hijau">
                        ${rupiah(value)}
                    </td>
                    `;

                }else{

                    html += `
                    <td class="merah">
                        -
                    </td>
                    `;

                }

            }

        });

        grandTotal += totalBulan;

        html += `<td>${rupiah(totalBulan)}</td>`;
        html += '</tr>';

        tbody.innerHTML += html;

    });

    const pinjamanPeserta = {};
    let totalPinjaman = 0;

    const riwayatBody =
        document.querySelector('#riwayatTable tbody');

    if(riwayatData.length){

        const terakhir =
            riwayatData[riwayatData.length - 1];

        document.getElementById('updateTerakhir')
            .innerHTML =
            `<strong>${terakhir.Tanggal}</strong>`;
    }

    riwayatData.forEach(item => {

        const nominal =
            Number(item.Bayar);

        riwayatBody.innerHTML += `
        <tr>
            <td>${item.Tanggal}</td>
            <td>${item.Nama}</td>
            <td class="${
                nominal >= 0
                ? 'hijau'
                : 'merah'
            }">
                ${rupiah(nominal)}
            </td>
        </tr>
        `;

        if(nominal < 0){

            const jumlah =
                Math.abs(nominal);

            totalPinjaman += jumlah;

            pinjamanPeserta[item.Nama] =
                (pinjamanPeserta[item.Nama] || 0)
                + jumlah;

        }

    });

    Object.entries(pinjamanPeserta)
    .forEach(([nama,jumlah]) => {

        if(totals[nama] !== undefined){

            totals[nama] -= jumlah;
            grandTotal -= jumlah;

        }

    });

    let totalRow =
        '<tr class="total-row"><td>TOTAL</td>';

    peserta.forEach(p => {

        totalRow += `
        <td>${rupiah(totals[p])}</td>
        `;

    });

    totalRow += `
    <td>${rupiah(grandTotal)}</td>
    </tr>
    `;

    tbody.innerHTML += totalRow;

    document.getElementById('grandTotal')
        .innerText = rupiah(grandTotal);

    document.getElementById('totalPinjaman')
        .innerText = rupiah(totalPinjaman);

    const ranking =
        Object.entries(totals)
        .sort((a,b)=>b[1]-a[1]);

    const medals = ['🥇','🥈','🥉'];

    let rankingHTML = '';

    ranking.forEach((item,index)=>{

        const icon =
            medals[index] || (index+1)+'.';

        rankingHTML += `
        <div class="ranking-item">
            <span>${icon} ${item[0]}</span>
            <strong>${rupiah(item[1])}</strong>
        </div>
        `;

    });

    document.getElementById('ranking')
        .innerHTML = rankingHTML;

    let htmlPinjaman = '';

    Object.entries(pinjamanPeserta)
    .forEach(([nama,jumlah]) => {

        htmlPinjaman += `
        <div class="ranking-item">
            <span>${nama}</span>
            <strong class="merah">
                ${rupiah(jumlah)}
            </strong>
        </div>
        `;

    });

    if(htmlPinjaman === ''){

        htmlPinjaman =
        '<span class="hijau">Tidak ada pinjaman 🎉</span>';

    }

    document.getElementById('pesertaPinjaman')
        .innerHTML = htmlPinjaman;

    let bulanTerakhir = null;

    for(let i = tabunganData.length - 1; i >= 0; i--){

        const row = tabunganData[i];

        const adaPembayaran =
            peserta.some(
                p => Number(row[p] || 0) > 0
            );

        if(adaPembayaran){

            bulanTerakhir = row;
            break;

        }

    }

    const belum = [];

    peserta.forEach(p => {

        const nilai =
            Number(bulanTerakhir[p] || 0);

        if(nilai === 0){

            belum.push(p);

        }

    });

    let belumHTML = '';

    if(belum.length === 0){

        belumHTML =
        '<span class="hijau">Semua peserta sudah menabung 🎉</span>';

    }else{

        belumHTML = `
        <strong>Bulan ${bulanTerakhir.Bulan}</strong>
        <br><br>
        ${belum.length} Orang:
        <br>
        ${belum.join(', ')}
        `;

    }

    document.getElementById('belumNabung')
        .innerHTML = belumHTML;

});

</script>
</script></body>
  </html>
